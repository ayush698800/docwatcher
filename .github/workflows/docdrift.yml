name: DocDrift

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run DocDrift
        uses: ./
        with:
          groq_api_key: ${{ secrets.GROQ_API_KEY }}
