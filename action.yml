name: DocDrift
description: Detects stale documentation by watching your git diffs using local or cloud AI
author: ayush698800
branding:
  icon: book-open
  color: green

inputs:
  groq_api_key:
    description: Groq API key for LLM checks
    required: false

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install DocDrift
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install ${{ github.action_path }}

    - name: Run DocDrift
      shell: bash
      env:
        GROQ_API_KEY: ${{ inputs.groq_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        python ${{ github.action_path }}/run_action.py
